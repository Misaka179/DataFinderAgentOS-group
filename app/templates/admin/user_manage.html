{% extends "base.html" %}
{% block body %}
<style>
.layui-body {
    padding: 20px;
}
.user-management {
    background: #fff;
    padding: 20px;
    border-radius: 8px;
}
.search-bar {
    margin-bottom: 20px;
    padding: 15px;
    background: #f8f9fa;
    border-radius: 6px;
}
.table-wrapper {
    margin-top: 15px;
}
.batch-actions {
    margin-bottom: 15px;
}
</style>

<div class="user-management">
    <h2 style="margin-bottom: 20px;">用户管理</h2>
    
    <!-- 搜索区 -->
    <div class="search-bar">
        <form class="layui-form" lay-filter="searchForm">
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md3">
                    <div class="layui-form-item">
                        <label class="layui-form-label">用户名</label>
                        <div class="layui-input-block">
                            <input type="text" name="search" placeholder="请输入用户名" class="layui-input">
                        </div>
                    </div>
                </div>
                <div class="layui-col-md3">
                    <div class="layui-form-item">
                        <label class="layui-form-label">角色</label>
                        <div class="layui-input-block">
                            <select name="role_id" lay-search>
                                <option value="">全部角色</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui-col-md3">
                    <div class="layui-form-item">
                        <label class="layui-form-label">状态</label>
                        <div class="layui-input-block">
                            <select name="status">
                                <option value="">全部状态</option>
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui-col-md3">
                    <div class="layui-form-item">
                        <label class="layui-form-label">&nbsp;</label>
                        <div class="layui-input-block">
                            <button type="submit" class="layui-btn" lay-submit lay-filter="searchBtn">搜索</button>
                            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    
    <!-- 批量操作区 -->
    <div class="batch-actions">
        <button class="layui-btn" id="btnAdd"><i class="layui-icon layui-icon-add-1"></i> 新增用户</button>
        <button class="layui-btn layui-btn-danger" id="btnBatchDelete" disabled><i class="layui-icon layui-icon-delete"></i> 批量删除</button>
    </div>
    
    <!-- 列表区 -->
    <div class="table-wrapper">
        <table class="layui-table" lay-skin="line" id="userTable">
            <thead>
                <tr>
                    <th><input type="checkbox" lay-skin="primary" lay-filter="allChoose"></th>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>角色</th>
                    <th>状态</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                <!-- 动态加载 -->
            </tbody>
        </table>
    </div>
    
    <!-- 分页区 -->
    <div id="pagination" style="margin-top: 20px; text-align: right;"></div>
</div>

<!-- 新增/编辑对话框 -->
<div id="userDialog" style="display: none; padding: 20px;">
    <form class="layui-form" lay-filter="userForm">
        <input type="hidden" name="id">
        <div class="layui-form-item">
            <label class="layui-form-label">用户名</label>
            <div class="layui-input-block">
                <input type="text" name="username" lay-verify="required" placeholder="请输入用户名" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">密码</label>
            <div class="layui-input-block">
                <input type="password" name="password" placeholder="新增时必填，编辑时留空则不修改" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">角色</label>
            <div class="layui-input-block">
                <select name="role_id" lay-verify="required">
                    <!-- 动态加载 -->
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">状态</label>
            <div class="layui-input-block">
                <input type="radio" name="status" value="1" title="启用" checked>
                <input type="radio" name="status" value="0" title="禁用">
            </div>
        </div>
    </form>
</div>
{% end %}

{% block script %}
<script>
layui.use(['table', 'form', 'layer', 'laypage'], function(){
    var table = layui.table;
    var form = layui.form;
    var layer = layui.layer;
    var laypage = layui.laypage;
    var $ = layui.$;
    
    var currentPage = 1;
    var pageSize = 20;
    
    // 加载角色列表
    function loadRoles() {
        $.ajax({
            url: '/admin/api/roles',
            type: 'GET',
            success: function(res) {
                if (res.code === 0) {
                    // 填充搜索栏角色下拉
                    var roleSelect = $('select[name="role_id"]');
                    roleSelect.prepend('<option value="">全部角色</option>');
                    res.data.forEach(function(role) {
                        roleSelect.find('select[name="role_id"]').length > 1 ? 
                            roleSelect.eq(1).append('<option value="'+role.id+'">'+role.name+'</option>') :
                            roleSelect.append('<option value="'+role.id+'">'+role.name+'</option>');
                    });
                    form.render('select');
                }
            }
        });
    }
    
    // 加载用户列表
    function loadUsers() {
        var search = $('input[name="search"]').val();
        var role_id = $('select[name="role_id"]').val();
        var status = $('select[name="status"]').val();
        
        $.ajax({
            url: '/admin/api/users',
            type: 'GET',
            data: {
                page: currentPage,
                page_size: pageSize,
                search: search,
                role_id: role_id,
                status: status
            },
            success: function(res) {
                if (res.code === 0) {
                    var tbody = $('#userTableBody');
                    tbody.empty();
                    
                    res.data.data.forEach(function(user) {
                        var statusHtml = user.status == 1 ? 
                            '<span class="layui-badge layui-bg-green">启用</span>' : 
                            '<span class="layui-badge">禁用</span>';
                        
                        tbody.append('<tr>' +
                            '<td><input type="checkbox" name="userId" value="'+user.id+'" lay-skin="primary"></td>' +
                            '<td>'+user.id+'</td>' +
                            '<td>'+user.username+'</td>' +
                            '<td>'+user.role_name+'</td>' +
                            '<td>'+statusHtml+'</td>' +
                            '<td>'+user.created_at+'</td>' +
                            '<td>' +
                                '<button class="layui-btn layui-btn-xs" onclick="editUser('+user.id+')">编辑</button> ' +
                                '<button class="layui-btn layui-btn-danger layui-btn-xs" onclick="deleteUser('+user.id+')">删除</button>' +
                            '</td>' +
                        '</tr>');
                    });
                    
                    // 渲染分页
                    laypage.render({
                        elem: 'pagination',
                        count: res.data.total,
                        curr: currentPage,
                        limit: pageSize,
                        jump: function(obj, first){
                            if(!first){
                                currentPage = obj.curr;
                                loadUsers();
                            }
                        }
                    });
                }
            }
        });
    }
    
    // 搜索
    form.on('submit(searchBtn)', function(data){
        currentPage = 1;
        loadUsers();
        return false;
    });
    
    // 新增用户
    $('#btnAdd').on('click', function(){
        layer.open({
            type: 1,
            title: '新增用户',
            area: ['500px', '400px'],
            content: $('#userDialog'),
            btn: ['确定', '取消'],
            yes: function(index){
                var formData = form.val('userForm');
                if (!formData.password) {
                    layer.msg('请输入密码', {icon: 2});
                    return;
                }
                
                $.ajax({
                    url: '/admin/api/users',
                    type: 'POST',
                    data: formData,
                    success: function(res) {
                        if (res.code === 0) {
                            layer.msg('用户创建成功', {icon: 1});
                            layer.close(index);
                            loadUsers();
                        } else {
                            layer.msg(res.msg, {icon: 2});
                        }
                    }
                });
            }
        });
    });
    
    // 编辑用户
    window.editUser = function(userId) {
        layer.open({
            type: 1,
            title: '编辑用户',
            area: ['500px', '400px'],
            content: $('#userDialog'),
            btn: ['确定', '取消'],
            success: function(layero){
                // TODO: 加载用户信息
            },
            yes: function(index){
                var formData = form.val('userForm');
                $.ajax({
                    url: '/admin/api/users',
                    type: 'PUT',
                    data: {user_id: userId, ...formData},
                    success: function(res) {
                        if (res.code === 0) {
                            layer.msg('用户更新成功', {icon: 1});
                            layer.close(index);
                            loadUsers();
                        }
                    }
                });
            }
        });
    };
    
    // 删除用户
    window.deleteUser = function(userId) {
        layer.confirm('确定要删除该用户吗？', {icon: 3, title:'提示'}, function(index){
            $.ajax({
                url: '/admin/api/users',
                type: 'DELETE',
                data: {user_id: userId},
                success: function(res) {
                    if (res.code === 0) {
                        layer.msg('用户删除成功', {icon: 1});
                        loadUsers();
                    }
                    layer.close(index);
                }
            });
        });
    };
    
    // 批量删除
    $('#btnBatchDelete').on('click', function(){
        var checkedIds = [];
        $('input[name="userId"]:checked').each(function(){
            checkedIds.push($(this).val());
        });
        
        if (checkedIds.length === 0) {
            layer.msg('请先选择用户', {icon: 2});
            return;
        }
        
        layer.confirm('确定要删除选中的 '+checkedIds.length+' 个用户吗？', function(index){
            // TODO: 实现批量删除
            layer.msg('批量删除功能待实现', {icon: 1});
            layer.close(index);
        });
    });
    
    // 全选/取消全选
    $('input[lay-skin="primary"]').on('click', function(){
        var isChecked = $(this).prop('checked');
        $('input[name="userId"]').prop('checked', isChecked);
        form.render('checkbox');
        
        // 更新批量删除按钮状态
        $('#btnBatchDelete').prop('disabled', !isChecked);
    });
    
    // 初始化
    loadRoles();
    loadUsers();
});
</script>
{% end %}
