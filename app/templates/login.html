{% extends "base.html" %}
{% block head %}
<style>
/* 覆盖全局body样式（chat.css设了overflow:hidden） */
html, body {
    overflow: visible !important;
    height: 100%;
}
/* 覆盖base.css中.container的flex居中，避免登录容器被压缩 */
.container {
    display: block !important;
    align-items: stretch !important;
    height: 100%;
}
.login-container {
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    background-size: cover;
    background-attachment: fixed;
    padding: 20px;
}
.login-box {
    width: 100%;
    max-width: 960px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
    overflow: hidden;
    display: flex;
}
.login-left {
    flex: 1;
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    padding: 60px 50px;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.login-right {
    flex: 1;
    padding: 45px 50px;
    background: #f8fafc;
}
.login-right form {
    width: 100%;
}
.login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 40px;
}
.login-logo-icon {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,.2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
}
.login-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 20px;
    color: #1e293b;
}
.login-desc {
    color: #64748b;
    margin-bottom: 30px;
    font-size: 14px;
}
.login-input-group {
    margin-bottom: 20px;
}
.login-input-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #334155;
}
.layui-input {
    height: 44px;
    border-radius: 8px;
    border-color: #e2e8f0;
    padding-left: 40px;
    line-height: normal;
    box-shadow: none !important;
    outline: none;
    font-size: 14px;
    color: #1e293b;
    transition: none;
}
.layui-input:focus {
    border-color: #e2e8f0;
    box-shadow: none !important;
}
.input-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
}
.login-btn {
    width: 100%;
    height: 44px;
    border-radius: 8px;
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    font-size: 16px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    color: #fff;
}
.login-btn:hover {
    background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
}
.login-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}
.login-error {
    margin-bottom: 20px;
    padding: 12px 16px;
    background: #fef2f2;
    color: #dc2626;
    border-radius: 8px;
    border: 1px solid #fecaca;
    display: none;
}
.login-error.active {
    display: block;
}
.login-footer {
    margin-top: 30px;
    text-align: center;
    color: #94a3b8;
    font-size: 13px;
}
.login-footer a {
    color: #2563eb;
    text-decoration: none;
}
.login-footer a:hover {
    text-decoration: underline;
}
.left-title {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 20px;
}
.left-desc {
    font-size: 14px;
    opacity: .9;
    line-height: 1.8;
    margin-bottom: 30px;
}
.left-features {
    margin-top: 20px;
}
.left-feature-item {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding: 12px 16px;
    background: rgba(255,255,255,.1);
    border-radius: 8px;
}
.left-feature-item .feat-icon {
    font-size: 20px;
    width: 32px;
    text-align: center;
}
@media screen and (max-width: 768px) {
    .login-box {
        flex-direction: column;
    }
    .login-left {
        padding: 40px 30px;
    }
    .login-right {
        padding: 40px 30px;
    }
}
</style>
{% end %}
{% block body %}
<div class="login-container">
    <div class="login-box">
        <div class="login-left">
            <div class="login-logo">
                <div class="login-logo-icon">O</div>
                <span style="font-size: 18px; font-weight: 600;">智能瞭望与问数系统</span>
            </div>
            <div class="left-title">数据智能<br>瞭望与问数</div>
            <div class="left-desc">
                基于AI大模型的政务数据智能采集与分析平台，让数据对话，让决策有据。
            </div>
            <div class="left-features">
                <div class="left-feature-item">
                    <div class="feat-icon">💬</div>
                    <span>类ChatGPT智能问数对话</span>
                </div>
                <div class="left-feature-item">
                    <div class="feat-icon">🔍</div>
                    <span>多源数据智能采集与瞭望</span>
                </div>
                <div class="left-feature-item">
                    <div class="feat-icon">📊</div>
                    <span>数据统计分析与图形报表</span>
                </div>
                <div class="left-feature-item">
                    <div class="feat-icon">🤖</div>
                    <span>多技能数字员工协同</span>
                </div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-title">欢迎登录</div>
            <div class="login-desc">请输入您的账号信息以访问智能问数系统</div>

            <div class="login-error" id="authError"></div>

            <form method="post" id="loginForm">
                {% module xsrf_form_html() %}
                <div class="login-input-group">
                    <label>用户名</label>
                    <div style="position: relative;">
                        <i class="layui-icon layui-icon-username input-icon"></i>
                        <input type="text" name="username" class="layui-input" placeholder="请输入用户名" required autocomplete="username">
                    </div>
                </div>
                <div class="login-input-group">
                    <label>密码</label>
                    <div style="position: relative;">
                        <i class="layui-icon layui-icon-password input-icon"></i>
                        <input type="password" name="password" class="layui-input" placeholder="请输入密码" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">登 录</button>
            </form>

            <div class="login-footer">
                还没有账号？<a href="/register">立即注册</a>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm')?.addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('authError');
    btn.disabled = true;
    btn.textContent = '登录中...';
    errorEl.classList.remove('active');

    const formData = new URLSearchParams(new FormData(this));
    try {
        const resp = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        if (resp.redirected) {
            window.location.href = resp.url;
            return;
        }
        if (!resp.ok) {
            errorEl.textContent = resp.status === 401 ? '用户名或密码错误' : '登录失败，请重试';
            errorEl.classList.add('active');
            return;
        }
        const html = await resp.text();
        if (html.includes('/chat')) {
            window.location.href = '/index';
        } else {
            errorEl.textContent = '登录失败，请检查用户名和密码';
            errorEl.classList.add('active');
        }
    } catch(e) {
        errorEl.textContent = '网络错误，请稍后重试';
        errorEl.classList.add('active');
    } finally {
        btn.disabled = false;
        btn.textContent = '登 录';
    }
});
</script>
{% end %}
