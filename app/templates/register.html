{% extends "base.html" %}
{% block head %}
<style>
/* 覆盖全局body样式（chat.css设了overflow:hidden） */
html, body {
    overflow: visible !important;
    height: 100%;
}
/* 覆盖base.css中.container的flex居中，避免登录容器被压缩 */
.container {
    display: block !important;
    align-items: stretch !important;
    height: 100%;
}
.login-container {
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    background-size: cover;
    background-attachment: fixed;
    padding: 20px;
}
.login-box {
    width: 100%;
    max-width: 960px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
    overflow: hidden;
    display: flex;
}
.login-left {
    flex: 1;
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    padding: 60px 50px;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.login-right {
    flex: 1;
    padding: 45px 50px;
    background: #f8fafc;
}
.login-right form {
    width: 100%;
}
.login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 40px;
}
.login-logo-icon {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,.2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
}
.login-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 20px;
    color: #1e293b;
}
.login-desc {
    color: #64748b;
    margin-bottom: 30px;
    font-size: 14px;
}
.login-input-group {
    margin-bottom: 20px;
}
.login-input-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #334155;
}
.layui-input {
    height: 44px;
    border-radius: 8px;
    border-color: #e2e8f0;
    padding-left: 40px;
}
.input-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
}
.login-btn {
    width: 100%;
    height: 44px;
    border-radius: 8px;
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    font-size: 16px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    color: #fff;
}
.login-btn:hover {
    background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
}
.login-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}
.login-error {
    margin-bottom: 20px;
    padding: 12px 16px;
    background: #fef2f2;
    color: #dc2626;
    border-radius: 8px;
    border: 1px solid #fecaca;
    display: none;
}
.login-error.active {
    display: block;
}
.login-footer {
    margin-top: 30px;
    text-align: center;
    color: #94a3b8;
    font-size: 13px;
}
.login-footer a {
    color: #2563eb;
    text-decoration: none;
}
.login-footer a:hover {
    text-decoration: underline;
}
.left-title {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 20px;
}
.left-desc {
    font-size: 14px;
    opacity: .9;
    line-height: 1.8;
    margin-bottom: 30px;
}
.left-features {
    margin-top: 20px;
}
.left-feature-item {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding: 12px 16px;
    background: rgba(255,255,255,.1);
    border-radius: 8px;
}
.left-feature-item .feat-icon {
    font-size: 20px;
    width: 32px;
    text-align: center;
}
@media screen and (max-width: 768px) {
    .login-box {
        flex-direction: column;
    }
    .login-left {
        padding: 40px 30px;
    }
    .login-right {
        padding: 40px 30px;
    }
}
</style>
{% end %}
{% block body %}
<div class="login-container">
    <div class="login-box">
        <div class="login-left">
            <div class="login-logo">
                <div class="login-logo-icon">O</div>
                <span style="font-size: 18px; font-weight: 600;">智能瞭望与问数系统</span>
            </div>
            <div class="left-title">开启<br>智能问数之旅</div>
            <div class="left-desc">
                注册即享AI驱动的数据对话、智能采集与多维度数据分析能力。
            </div>
            <div class="left-features">
                <div class="left-feature-item">
                    <div class="feat-icon">💬</div>
                    <span>自然语言数据问答</span>
                </div>
                <div class="left-feature-item">
                    <div class="feat-icon">🔍</div>
                    <span>多源数据智能采集</span>
                </div>
                <div class="left-feature-item">
                    <div class="feat-icon">📊</div>
                    <span>自动生成图表报表</span>
                </div>
                <div class="left-feature-item">
                    <div class="feat-icon">🔒</div>
                    <span>数据安全保障</span>
                </div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-title">创建账号</div>
            <div class="login-desc">注册政务智能瞭望与问数系统</div>

            <div class="login-error" id="authError"></div>

            <form id="registerForm">
                {% module xsrf_form_html() %}
                <div class="login-input-group">
                    <label>用户名</label>
                    <div style="position: relative;">
                        <i class="layui-icon layui-icon-username input-icon"></i>
                        <input type="text" id="username" name="username" class="layui-input" placeholder="请输入用户名（2-50个字符）" required autocomplete="username">
                    </div>
                </div>
                <div class="login-input-group">
                    <label>密码</label>
                    <div style="position: relative;">
                        <i class="layui-icon layui-icon-password input-icon"></i>
                        <input type="password" id="password" name="password" class="layui-input" placeholder="请输入密码（至少6位）" required autocomplete="new-password">
                    </div>
                </div>
                <div class="login-input-group">
                    <label>确认密码</label>
                    <div style="position: relative;">
                        <i class="layui-icon layui-icon-password input-icon"></i>
                        <input type="password" id="confirm_password" name="confirm_password" class="layui-input" placeholder="再次输入密码" required autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" class="login-btn" id="registerBtn">注 册</button>
            </form>

            <div class="login-footer">
                已有账号？<a href="/login">立即登录</a>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('registerForm')?.addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    const errorEl = document.getElementById('authError');
    btn.disabled = true;
    btn.textContent = '注册中...';
    errorEl.classList.remove('active');

    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    if (password !== confirm) {
        errorEl.textContent = '两次密码输入不一致';
        errorEl.classList.add('active');
        btn.disabled = false;
        btn.textContent = '注 册';
        return;
    }
    if (password.length < 6) {
        errorEl.textContent = '密码长度不能少于6位';
        errorEl.classList.add('active');
        btn.disabled = false;
        btn.textContent = '注 册';
        return;
    }

    const xsrfInput = document.querySelector('input[name="_xsrf"]');
    const xsrfToken = xsrfInput ? xsrfInput.value : '';

    const formData = new URLSearchParams();
    formData.set('username', document.getElementById('username').value);
    formData.set('password', password);
    formData.set('confirm_password', confirm);
    formData.set('_xsrf', xsrfToken);

    try {
        const resp = await fetch('/api/user/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        const data = await resp.json();
        if (data.success) {
            alert('注册成功！请登录');
            window.location.href = '/login';
        } else {
            errorEl.textContent = data.message || '注册失败';
            errorEl.classList.add('active');
        }
    } catch(e) {
        errorEl.textContent = '网络错误，请稍后重试';
        errorEl.classList.add('active');
    } finally {
        btn.disabled = false;
        btn.textContent = '注 册';
    }
});
</script>
{% end %}
